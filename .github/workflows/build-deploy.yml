name: Build & Deploy multi-services (single EC2)

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      EC2_IP: ${{ secrets.EC2_IP }}
      DB_ENDPOINT: ${{ secrets.DB_ENDPOINT }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Java & Maven
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Validate deploy secrets
        run: |
          test -n "${{ secrets.EC2_IP }}"
          test -n "${{ secrets.EC2_SSH_KEY_BASE64 }}"
          test -n "${{ secrets.DB_ENDPOINT }}"
          test -n "${{ secrets.DB_PASSWORD }}"

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y maven

      - name: Build services where required
        run: |
          echo "Starting build for all services"
          for svc in user-service product-service order-service; do
            echo "-------------------------------------------"
            echo "Building $svc..."
            if [ -f "services/$svc/pom.xml" ]; then
              mvn -f "services/$svc/pom.xml" -B clean package
            else
              echo "No pom.xml for $svc, skipping"
            fi
          done
          echo "-------------------------------------------"
          echo "Build step completed"

      - name: Recreate SSH private key file from secret
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.EC2_SSH_KEY_BASE64 }}" | base64 --decode > id_rsa
          chmod 600 id_rsa
          ls -l id_rsa

      - name: Run deploy script
        env:
          DB_ENDPOINT: ${{ secrets.DB_ENDPOINT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          chmod +x scripts/deploy_services.sh
          ./scripts/deploy_services.sh "${{ secrets.EC2_IP }}" ./id_rsa "${{ secrets.DB_ENDPOINT }}"

      - name: Run post-deploy health checks
        env:
          DB_ENDPOINT: ${{ secrets.DB_ENDPOINT }}
        run: |
          chmod +x scripts/health_check.sh
          ./scripts/health_check.sh "${{ secrets.EC2_IP }}" ./id_rsa "${{ secrets.DB_ENDPOINT }}"
